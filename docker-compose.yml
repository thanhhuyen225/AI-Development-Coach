services:
  backend:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.backend
    env_file: .env
    ports:
      - "8080:8080"
    volumes:
      - ./backend/data:/app/data

  frontend:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
